<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <div class="max-w-md w-full bg-gray-800 p-6 rounded-2xl shadow-2xl mt-10">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-500">
            <i class="fab fa-facebook mr-2"></i>FB Downloader
        </h1>
        
        <div class="space-y-4">
            <input type="text" id="fbUrl" placeholder="Paste Facebook Video Link here..." 
                class="w-full p-4 rounded-xl bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white">
            
            <button onclick="downloadVideo()" id="btnText"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition duration-300">
                Get Download Links
            </button>
        </div>

        <div id="loader" class="hidden mt-6 text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mx-auto"></div>
            <p class="mt-2 text-gray-400">Fetching video data...</p>
        </div>

        <div id="result" class="hidden mt-8 space-y-4">
            <p class="text-center font-medium text-gray-300">Choose Quality:</p>
            <div id="linksContainer" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('fbUrl').value;
            const resultDiv = document.getElementById('result');
            const linksContainer = document.getElementById('linksContainer');
            const loader = document.getElementById('loader');

            if (!url) return alert('Please paste a link first!');

            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            linksContainer.innerHTML = '';

            try {
                const response = await fetch(`/api/facebook?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.status === 'success' && data.results) {
                    data.results.forEach(res => {
                        if (res.url && res.url !== '/') {
                            const btn = document.createElement('button');
                            btn.className = "w-full bg-gray-700 hover:bg-gray-600 p-4 rounded-xl flex justify-between items-center transition";
                            btn.innerHTML = `<span>${res.quality}</span> <i class="fas fa-download"></i>`;
                            btn.onclick = () => forceDownload(res.url, `fb-video-${res.quality}.mp4`);
                            linksContainer.appendChild(btn);
                        }
                    });
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('Could not find video data. Make sure link is public.');
                }
            } catch (err) {
                alert('Error connecting to server');
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function forceDownload(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>

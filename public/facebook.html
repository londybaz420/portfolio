<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Downloader - Team Bandaheali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .fb-gradient {
            background: linear-gradient(135deg, #1877f2 0%, #0a4fa1 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header / Branding -->
    <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold mb-2 text-white">
            Team <span class="text-blue-500">Bandaheali</span>
        </h1>
        <p class="text-slate-400">Premium Facebook Video Downloader</p>
    </div>

    <!-- Main Card -->
    <div class="glass w-full max-w-2xl rounded-3xl p-6 md:p-10 shadow-2xl">
        <div class="flex items-center justify-center mb-8">
            <div class="fb-gradient p-4 rounded-2xl shadow-lg shadow-blue-500/20">
                <i class="fab fa-facebook text-4xl text-white"></i>
            </div>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <input type="text" id="fbUrl" 
                    placeholder="Paste Facebook video/reel link here..." 
                    class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white placeholder:text-slate-500">
            </div>
            
            <button onclick="downloadVideo()" id="downloadBtn" 
                class="w-full fb-gradient hover:opacity-90 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 group shadow-xl">
                <span>Fetch Video</span>
                <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <!-- Result Section -->
        <div id="result" class="hidden mt-10 space-y-6 pt-6 border-t border-slate-700/50">
            <div class="flex flex-col items-center text-center">
                <h3 class="text-xl font-semibold mb-4 text-slate-200">Video Found! Select Quality:</h3>
                <div id="downloadLinks" class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                    <!-- Links will appear here -->
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden mt-8 text-center text-blue-400">
            <i class="fas fa-circle-notch fa-spin text-3xl"></i>
            <p class="mt-2 text-sm">Processing your link...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-12 text-slate-500 text-sm">
        <p>&copy; 2024 Team Bandaheali. High Speed Downloads.</p>
    </footer>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('fbUrl').value;
            const btn = document.getElementById('downloadBtn');
            const resultDiv = document.getElementById('result');
            const linksDiv = document.getElementById('downloadLinks');
            const loader = document.getElementById('loader');

            if (!url) return alert('Please paste a link first!');

            // UI Reset
            btn.disabled = true;
            btn.style.opacity = '0.5';
            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            linksDiv.innerHTML = '';

            try {
                const response = await fetch(`/api/facebook?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.status === 'success' && data.results) {
                    data.results.forEach(res => {
                        if (res.url && res.url !== '/') {
                            const card = document.createElement('button');
                            card.className = "bg-slate-800 hover:bg-slate-700 border border-slate-700 p-4 rounded-xl flex items-center justify-between transition-all group";
                            card.onclick = () => startDownload(res.url, `FB_Video_${res.quality}.mp4`);
                            
                            card.innerHTML = `
                                <div class="flex items-center gap-3">
                                    <i class="fas fa-video text-blue-400"></i>
                                    <span class="font-medium">${res.quality}</span>
                                </div>
                                <i class="fas fa-download text-slate-500 group-hover:text-white"></i>
                            `;
                            linksDiv.appendChild(card);
                        }
                    });
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('Could not fetch video. Please check the URL.');
                }
            } catch (err) {
                alert('Connection error. Try again.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                loader.classList.add('hidden');
            }
        }

        async function startDownload(url, filename) {
            try {
                const btn = event.currentTarget;
                const originalContent = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Downloading...';
                
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                
                btn.innerHTML = originalContent;
            } catch (e) {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>

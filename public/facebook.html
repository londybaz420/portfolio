<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center p-6">
    <div class="max-w-2xl w-full text-center mt-10">
        <h1 class="text-4xl font-bold text-blue-500 mb-4"><i class="fab fa-facebook mr-2"></i>FB Downloader</h1>
        <p class="text-gray-400 mb-8">Download Facebook videos for free</p>

        <div class="glass p-6 rounded-2xl shadow-xl">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="fbUrl" placeholder="Paste Facebook Video Link here..." 
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="downloadVideo()" id="downBtn" class="bg-blue-600 hover:bg-blue-700 font-bold px-8 py-3 rounded-xl transition-all flex items-center justify-center">
                    <span id="btnText">Get Video</span>
                </button>
            </div>
            <div id="loading" class="hidden mt-4 text-blue-400 animate-pulse">Processing... Please wait...</div>
        </div>

        <div id="result" class="hidden glass p-6 rounded-2xl mt-8">
            <div id="videoMeta" class="flex flex-col items-center">
                <img id="thumb" class="w-full rounded-xl mb-4 max-h-64 object-cover" src="" alt="thumbnail">
                <h3 id="title" class="text-lg font-semibold mb-6"></h3>
                <div class="flex flex-wrap gap-4 justify-center">
                    <button onclick="directDownload('hd')" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-bold">Download HD</button>
                    <button onclick="directDownload('sd')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-bold">Download SD</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;

        async function downloadVideo() {
            const url = document.getElementById('fbUrl').value.trim();
            if(!url) return alert('Please paste a link!');

            const btn = document.getElementById('downBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            btn.disabled = true;
            btnText.innerText = 'Searching...';
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const response = await fetch(`/api/facebook?url=${encodeURIComponent(url)}`);
                const resData = await response.json();

                if(resData.status === "success" && resData.result.data) {
                    currentData = resData.result.data;
                    document.getElementById('thumb').src = currentData.thumbnail || 'https://via.placeholder.com/300?text=Facebook+Video';
                    document.getElementById('title').innerText = currentData.title || 'Facebook Video';
                    result.classList.remove('hidden');
                } else {
                    alert('Could not fetch video. Check link or try again later.');
                }
            } catch (err) {
                alert('Server connection error.');
            } finally {
                btn.disabled = false;
                btnText.innerText = 'Get Video';
                loading.classList.add('hidden');
            }
        }

        async function directDownload(quality) {
            const url = quality === 'hd' ? currentData.hd : currentData.sd;
            if(!url) return alert('Link not available for this quality');

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Downloading...';
            btn.disabled = true;

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `facebook-video-${quality}-${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
